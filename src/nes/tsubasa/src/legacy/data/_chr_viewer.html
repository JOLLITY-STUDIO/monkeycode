<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天使之翼2 · CHR字库 & 文本提取</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b1219;--srf:#131e2a;--s2:#1a2a3a;--bd:#253545;--tx:#c8d6e5;--mt:#6b7d8e;--rd:#ff6b6b;--gn:#1dd1a1;--gd:#feca57;--bl:#54a0ff}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
header{background:linear-gradient(135deg,#1a2733,#0f1923);border-bottom:2px solid var(--bd);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:1em;color:var(--rd)}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.8em;font-weight:600;background:var(--bl);color:#fff}
.content{padding:16px}
.drop{text-align:center;padding:40px;border:2px dashed var(--bd);border-radius:10px;margin:16px;cursor:pointer}
.drop.active{border-color:var(--rd);background:var(--s2)}
.hidden{display:none!important}
.tabs{display:flex;gap:2px;background:var(--srf);padding:4px 16px;border-bottom:1px solid var(--bd)}
.tab{padding:8px 16px;cursor:pointer;border-radius:6px 6px 0 0;font-size:.8em;color:var(--mt);border:1px solid transparent}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--rd);background:var(--s2);border-color:var(--bd);border-bottom-color:var(--s2)}
canvas{image-rendering:pixelated;border:1px solid var(--bd);border-radius:4px}
.tile-grid{display:flex;flex-wrap:wrap;gap:4px;max-height:600px;overflow-y:auto;padding:8px;background:var(--srf);border-radius:8px;border:1px solid var(--bd)}
.tile-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px;border:1px solid transparent;border-radius:4px;cursor:pointer}
.tile-item:hover{border-color:var(--bl);background:var(--s2)}
.tile-item .idx{font-family:Consolas,monospace;font-size:.6em;color:var(--mt)}
.tile-item .chr{font-size:.65em;color:var(--gd);min-height:1em}
table{width:100%;border-collapse:collapse;font-size:.75em}
th{padding:6px 4px;background:var(--s2);color:var(--mt);border-bottom:1px solid var(--bd)}
td{padding:5px 4px;text-align:center;border-bottom:1px solid rgba(37,53,69,.4);font-family:Consolas,monospace;font-size:.8em}
td.kanji{font-size:1.1em;font-family:'Yu Gothic','MS Gothic','MS Mincho',sans-serif;color:var(--gd)}
tr:hover td{background:rgba(84,160,255,.06)}
.detail{background:var(--srf);border-radius:8px;border:1px solid var(--bd);margin:12px 0;padding:16px}
.detail h3{color:var(--bl);font-size:.85em;margin-bottom:8px}
.detail textarea{width:100%;height:80px;background:var(--bg);color:var(--tx);border:1px solid var(--bd);border-radius:4px;padding:8px;font-family:Consolas,monospace;font-size:.8em}
.note{font-size:.7em;color:var(--mt);padding:8px;background:var(--s2);border-radius:4px;margin:4px 0}
</style>
</head>
<body>
<header>
  <h1>🎨 天使之翼2 · CHR字库 & 文本提取</h1>
  <span style="font-size:.75em;color:var(--mt)">拖入 ROM 开始 / 点击 tile 标注字符</span>
</header>

<div class="drop" id="drop">📂 拖入 .nes ROM 文件</div>

<div id="app" class="content hidden">
  <div class="tabs">
    <div class="tab on" data-t="tiles">🔤 CHR Tile 查看</div>
    <div class="tab" data-t="text">📝 文本提取</div>
  </div>

  <div id="tab-tiles">
    <div class="note">💡 点击 tile 可以标注对应字符。标注后可用于解码 ROM 中的文本。</div>
    <div style="display:flex;gap:8px;align-items:center;margin:8px 0">
      <label style="font-size:.8em;color:var(--mt)">CHR Bank:</label>
      <select id="chrBankSel" style="padding:4px 8px;background:var(--s2);color:var(--tx);border:1px solid var(--bd);border-radius:4px"></select>
      <label style="font-size:.8em;color:var(--mt)">起始 Tile:</label>
      <input id="chrStart" type="number" value="0" min="0" max="240" step="16" style="width:50px;padding:4px;background:var(--s2);color:var(--tx);border:1px solid var(--bd);border-radius:4px">
      <button class="btn" onclick="renderChrTiles()">刷新</button>
      <button class="btn" style="background:var(--gn)" onclick="exportMapping()">📥 导出映射</button>
      <button class="btn" style="background:var(--gd);color:#000" onclick="importMapping()">📤 导入映射</button>
    </div>
    <div class="tile-grid" id="tileGrid"></div>
  </div>

  <div id="tab-text" class="hidden">
    <div class="note">
      💡 自动扫描 Bank $09/$0A 场景脚本中的文本序列。如果有字符映射，会尝试解码显示。
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin:8px 0">
      <label style="font-size:.8em;color:var(--mt)">搜索 Bank:</label>
      <select id="txtBank" style="padding:4px 8px;background:var(--s2);color:var(--tx);border:1px solid var(--bd);border-radius:4px">
        <option value="9">Bank $09 (场景脚本A)</option>
        <option value="10">Bank $0A (场景脚本B)</option>
        <option value="4">Bank $04 (球员数据表)</option>
        <option value="12">Bank $0C (比赛引擎)</option>
      </select>
      <button class="btn" onclick="extractText()">🔍 扫描</button>
    </div>
    <div class="detail hidden" id="txtDetail">
      <h3>提取结果</h3>
      <table id="txtTable"></table>
    </div>
  </div>
</div>

<script>
// === ROM & CHR ===
let rom = null, chrOff = 0, tileMap = {};
const H=16, B=16384, OFF=0x8000;
function bo(b,a){return H+b*B+(a-OFF)}

// Drag & drop
const dz = document.getElementById('drop');
dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('active')});
dz.addEventListener('dragleave', ()=>dz.classList.remove('active'));
dz.addEventListener('drop', e=>{
  e.preventDefault();dz.classList.remove('active');
  const f = e.dataTransfer.files[0];
  if(!f||!f.name.toLowerCase().endsWith('.nes')){alert('需要 .nes 文件');return}
  const r = new FileReader();
  r.onload = ()=>{
    rom = new Uint8Array(r.result);
    chrOff = H + Math.floor((rom.length-H-128*1024)/B)*B; // PRG size
    dz.classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    // Populate chr bank select
    const sel = document.getElementById('chrBankSel');
    const chrBanks = 128*1024/8192;
    sel.innerHTML = Array.from({length:chrBanks},(_,i)=>`<option value="${i}">Bank ${i}</option>`).join('');
    sel.onchange = ()=> renderChrTiles();
    // Load saved mapping
    try{
      const saved = localStorage.getItem('tsubasa2_chr_map');
      if(saved) tileMap = JSON.parse(saved);
    }catch(e){}
    renderChrTiles();
  };
  r.readAsArrayBuffer(f);
});

// Tab switching
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    const tabId = 'tab-'+t.dataset.t;
    document.querySelectorAll('[id^="tab-"]').forEach(el=>{
      el.classList.toggle('hidden', el.id!==tabId);
    });
  });
});

// === CHR Tile Rendering ===
function renderChrTiles(){
  if(!rom) return;
  const bank = +document.getElementById('chrBankSel').value || 0;
  const start = +document.getElementById('chrStart').value || 0;
  const bankStart = chrOff + bank * 8192;
  const grid = document.getElementById('tileGrid');
  let html = '';
  for(let t=start; t<start+64 && t<256; t++){
    const td = rom.subarray(bankStart + t*16, bankStart + t*16 + 16);
    const canvas = document.createElement('canvas');
    canvas.width=16; canvas.height=16;
    const ctx = canvas.getContext('2d');
    // Render 8x8 tile scaled to 16x16
    const imgData = ctx.createImageData(16,16);
    for(let py=0; py<8; py++){
      const p0 = td[py], p1 = td[py+8];
      for(let px=0; px<8; px++){
        const bit = 1<<(7-px);
        const c = ((p0&bit)?1:0) + ((p1&bit)?2:0);
        const idx = (py*2*16 + px*2)*4;
        const colors = [0,0x60,0xb0,0xff]; // 0=透明, 1=暗, 2=中, 3=亮
        for(let dy=0; dy<2; dy++){
          for(let dx=0; dx<2; dx++){
            const offs = ((py*2+dy)*16 + px*2 + dx)*4;
            if(c===0){imgData.data[offs+3]=0}
            else{imgData.data[offs]=colors[c];imgData.data[offs+1]=colors[c];imgData.data[offs+2]=colors[c];imgData.data[offs+3]=255}
          }
        }
      }
    }
    ctx.putImageData(imgData,0,0);
    const dataUrl = canvas.toDataURL();
    const existing = tileMap[t] || '';
    html += `<div class="tile-item" onclick="annotateTile(${t})" title="点击标注Tile 0x${t.toString(16).toUpperCase()}"><img src="${dataUrl}" width="16" height="16"><span class="idx">${t.toString(16).toUpperCase().padStart(2,'0')}</span><span class="chr">${existing}</span></div>`;
  }
  grid.innerHTML = html;
}

function annotateTile(tidx){
  const existing = tileMap[tidx] || '';
  const ch = prompt(`Tile 0x${tidx.toString(16).toUpperCase()} 对应字符:`, existing);
  if(ch===null) return;
  if(ch==='') delete tileMap[tidx];
  else tileMap[tidx]=ch;
  localStorage.setItem('tsubasa2_chr_map', JSON.stringify(tileMap));
  renderChrTiles();
}

function exportMapping(){
  const json = JSON.stringify(tileMap, null, 2);
  const blob = new Blob([json],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chr_tile_map.json';
  a.click();
}

function importMapping(){
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = ()=>{
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const m = JSON.parse(r.result);
        Object.assign(tileMap, m);
        localStorage.setItem('tsubasa2_chr_map', JSON.stringify(tileMap));
        renderChrTiles();
        alert(`导入 ${Object.keys(m).length} 个字符映射`);
      }catch(e){alert('解析失败')}
    };
    r.readAsText(inp.files[0]);
  };
  inp.click();
}

// === Text Extraction ===
function extractText(){
  if(!rom) return;
  const bank = +document.getElementById('txtBank').value;
  const detail = document.getElementById('txtDetail');
  const table = document.getElementById('txtTable');

  // Find text-like sequences (consecutive bytes in 0x01-0xAF)
  const results = [];
  const limit = 200;
  for(let a=0x8000; a<=0xBFE0 && results.length<limit; a++){
    const off = bo(bank, a);
    if(off >= rom.length) break;
    let run = 0;
    while(off+run < Math.min(rom.length, bo(bank,0xC000)) && rom[off+run]>=0x01 && rom[off+run]<=0xAF) run++;
    if(run>=4 && run<=24){
      const hexVals = [];
      const decoded = [];
      for(let i=0;i<run;i++){
        const v = rom[off+i];
        hexVals.push(v.toString(16).toUpperCase().padStart(2,'0'));
        decoded.push(tileMap[v] || ('{'+v.toString(16).toUpperCase().padStart(2,'0')+'}'));
      }
      results.push({addr:a, length:run, hex:hexVals.join(' '), text:decoded.join('')});
      a += run - 1;
    }
  }

  if(results.length===0){
    table.innerHTML = '<tr><td colspan="4" style="color:var(--mt);padding:20px">未找到文本序列（可能需要先标注 CHR 字符映射）</td></tr>';
  } else {
    table.innerHTML = '<tr><th>地址</th><th>长度</th><th>Hex</th><th>解码</th></tr>' +
      results.map(r=>`<tr><td>$${r.addr.toString(16).toUpperCase().padStart(4,'0')}</td><td>${r.length}</td><td style="font-size:.7em">${r.hex}</td><td class="kanji">${r.text}</td></tr>`).join('');
  }
  detail.classList.remove('hidden');
}
</script>
</body>
</html>
