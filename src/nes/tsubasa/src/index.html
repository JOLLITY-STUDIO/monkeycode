<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天使之翼2 - NES TypeScript</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      margin-bottom: 16px;
      font-size: 24px;
      color: #ffd700;
    }
    canvas#game {
      image-rendering: pixelated;
      border: 2px solid #333;
      background: #000;
      width: 512px;
      height: 480px;
      margin-bottom: 12px;
    }
    .controls {
      margin: 12px 0;
    }
    button {
      background: #3a3a5c;
      color: #fff;
      border: 1px solid #555;
      padding: 8px 16px;
      margin: 0 4px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }
    button:hover { background: #4a4a7c; }
    .file-upload {
      margin: 12px 0;
    }
    #status {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
    .key-hints {
      font-size: 11px;
      color: #666;
      margin-top: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>天使之翼2</h1>
    <canvas id="game" width="256" height="240"></canvas>
    <div class="controls">
      <button id="btnStart">▶ 开始</button>
      <button id="btnStop">■ 停止</button>
      <button id="btnReset">↻ 重置</button>
    </div>
    <div id="status">正在初始化...</div>
    <div class="key-hints">
      🎮 方向键: 移动 | Z/A: 确认 | X/S: 取消 | Enter: Start | Shift: Select
    </div>
  </div>
  <script type="module" src="../tsubasa_js/index.js"></script>
</body>
</html>
