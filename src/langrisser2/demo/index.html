<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Langrisser II MD - TS Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 18px; margin-bottom: 12px; color: #fc0; }
    #game {
      border: 2px solid #444;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      width: 640px;
      height: 448px; /* 224 * 2 */
    }
    #info {
      margin-top: 12px;
      font-size: 12px;
      color: #888;
      max-width: 640px;
    }
    #controls {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    button {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      padding: 6px 12px;
      font-family: monospace;
      cursor: pointer;
    }
    button:hover { background: #444; }
  </style>
</head>
<body>
  <h1>Langrisser II MD - TS VDP Demo</h1>
  <canvas id="game"></canvas>
  <div id="controls">
    <button id="btnTest">测试画面</button>
    <button id="btnTitle">标题画面</button>
    <button id="btnStop">停止</button>
  </div>
  <div id="controls">
    <input type="file" id="romFile" accept=".bin,.smd,.md">
  </div>
  <div id="info">
    <p>纯 TypeScript VDP 硬件模拟演示</p>
    <p>数据源: ROM 0x80B2 VDP 寄存器初始配置 + Genesis 硬件手册</p>
    <p>使用方法: 选择 Langrisser II MD ROM 文件，点击"加载 ROM 资源"查看真实 tile 数据</p>
  </div>

  <script type="module" src="./demo-main.js"></script>
</body>
</html>
