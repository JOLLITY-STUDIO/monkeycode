<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langrisser II — 纯 TypeScript 实现</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #game-wrapper {
      position: relative;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      background: #000;
      /* 3x scale: 320x224 → 960x672 */
      width: 960px;
      height: 672px;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
    }
    #controls {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button, label.btn {
      background: #1a1a2e;
      color: #ccc;
      border: 1px solid #444;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }
    button:hover, label.btn:hover { background: #2a2a4e; border-color: #e94560; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    input[type=file] { display: none; }
    h1 { font-size: 16px; margin-bottom: 8px; color: #e94560; }
  </style>
</head>
<body>
  <h1>Langrisser II — 纯 TS VDP 模拟</h1>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="320" height="224"></canvas>
  </div>
  <div id="status">等待启动...</div>
  <div id="controls">
    <button id="btnBoot">启动标题画面</button>
    <button id="btnShop">商店</button>
    <button id="btnSave">存档</button>
    <button id="btnLoad">读档</button>
    <button id="btnBattle">战斗动画</button>
    <button id="btnStop" disabled>停止</button>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
