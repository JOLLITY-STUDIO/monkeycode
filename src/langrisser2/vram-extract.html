<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>L2 VRAM Capture</title>
<style>body{background:#000;color:#ccc;font-family:monospace;font-size:10px;padding:8px}
#emu{margin:4px 0;border:1px solid #333}.btn{background:#222;color:#4fc3f7;border:1px solid #4fc3f7;padding:4px 10px;font-size:10px;cursor:pointer;margin-right:4px}
.btn:disabled{opacity:.3}canvas.pixel{image-rendering:pixelated}.log{color:#888;font-size:9px;margin:4px 0;max-height:80px;overflow-y:auto}</style></head>
<body>
<button class="btn" id="btnRun">启动模拟器</button>
<button class="btn" id="btnSkip" disabled>跳过片头</button>
<button class="btn" id="btnState" disabled>导出状态文件</button>
<span id="msg" style="color:#ff0"></span>
<div class="log" id="log"></div>
<div id="emu" style="display:none"></div>
<canvas class="pixel" id="vramOut" width="512" height="256" style="margin-top:4px"></canvas>
<script src="Genesis.min.js"></script>
<script>
const L=msg=>{log.textContent+=msg+'\n';log.scrollTop=log.scrollHeight}
let f=0,booted=0,romBuf=null;

// Load ROM first
fetch('rom.md').then(r=>r.arrayBuffer()).then(b=>{romBuf=b;L(`ROM: ${b.byteLength}B`)});

document.getElementById('btnRun').onclick=()=>{
  if(!romBuf){L('ROM未就绪');return}
  document.getElementById('emu').style.display='block';
  embedGenesis({container:'emu',name:'L2',rom:romBuf,soundEnabled:false,
    cbStarted:()=>{booted=1;L('启动OK');document.getElementById('btnSkip').disabled=false;
      document.getElementById('btnState').disabled=false;
      // auto run 60 frames
      let n=60;function step(){if(!booted||n<=0){L('auto run done f='+f);return}
        GENESIS_PICO_SET_INPUT(0,GENESIS_INPUT_STATE_1);
        GENESIS_PICO_RUN_FRAME();f++;n--;
        requestAnimationFrame(step)}step();
    }});
};

document.getElementById('btnSkip').onclick=()=>{
  if(!booted)return;const S=0x2000;
  GENESIS_INPUT_STATE_1|=S;
  for(let i=0;i<6;i++){GENESIS_PICO_SET_INPUT(0,GENESIS_INPUT_STATE_1);GENESIS_PICO_RUN_FRAME();f++}
  GENESIS_INPUT_STATE_1&=~S;
  let n=90;function step(){if(!booted||n<=0){L('skip done');return}
    GENESIS_PICO_SET_INPUT(0,GENESIS_INPUT_STATE_1);GENESIS_PICO_RUN_FRAME();f++;n--;
    requestAnimationFrame(step)}step();
  L('按Start跳过');
};

document.getElementById('btnState').onclick=()=>{
  if(!booted)return;
  GENESIS_PICO_STATE_SAVE();
  const ptr=GENESIS_PICO_GET_STATE_BUFFER();
  const sz=GENESIS_PICO_GET_STATE_SIZE();
  L(`State: ${sz}B @${ptr.toString(16)}`);
  const h=GENESIS.HEAPU8;
  const buf=new Uint8Array(sz);
  for(let i=0;i<sz;i++)buf[i]=h[ptr+i];

  // Download
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([buf]));
  a.download=`l2-state-f${f}.bin`;
  a.click();
  L('状态已下载');

  // Show first 256 bytes of state
  let hex='';
  for(let i=0;i<256;i++)hex+=buf[i].toString(16).padStart(2,'0')+(i%16==15?'\n':' ');
  L('State[0:256]:\n'+hex);

  // Try to find VRAM in state: search for palette-like regions
  // In Genesis VRAM, palette starts at 0xC000. Each color is 2 bytes (0B GR).
  // Look for non-zero color data in state
  
  // Also capture the video buffer
  const vp=GENESIS_PICO_GET_VIDEO_BUFFER();
  const vw=GENESIS_PICO_GET_VIDEO_WIDTH();
  const vh=GENESIS_PICO_GET_VIDEO_HEIGHT();
  L(`Video: ${vw}x${vh} @${vp.toString(16)}`);
  
  // Show video buffer as pixel data
  renderVideoBuf(vp,vw,vh);
  scanStateForVRAM(buf);
};

function renderVideoBuf(ptr,w,h) {
  const cv=document.getElementById('vramOut');
  cv.width=w;cv.height=h;
  const ctx=cv.getContext('2d');
  const img=ctx.createImageData(w,h);
  const heap=GENESIS.HEAPU8;
  for(let i=0;i<w*h;i++){
    const lo=heap[ptr+i*2],hi=heap[ptr+i*2+1];
    const c=((hi&7)*36)|((lo>>5)*36<<8)|(((hi>>4)&7)*36<<16);
    img.data[i*4]=c&0xFF;img.data[i*4+1]=(c>>8)&0xFF;img.data[i*4+2]=(c>>16)&0xFF;img.data[i*4+3]=255;
  }
  ctx.putImageData(img,0,0);
}

function scanStateForVRAM(buf) {
  // PicoDrive state structure (from pico/pico_int.h and pico/state.c):
  // State starts with version(4B) then PicoCPU then PicoVideo then ...
  // PicoVideo starts after PicoCPU (~0x4D8 bytes in 32-bit PicoDrive)
  // PicoVideo.vram starts after VDP regs (~0x5C bytes into PicoVideo)
  // Total offset to VRAM from state start: ~0x4D8 + 0x5C = ~0x534
  
  // But we need to confirm. Let's search for VRAM signature:
  // CRAM (palette) is stored at a known offset.
  // Search for known patterns in the state
  const stateSz = buf.length;
  L(`State size: ${stateSz} (0x${stateSz.toString(16)})`);
  
  // Look for Genesis palette data pattern in state
  // Genesis CRAM: 64 colors × 2 bytes each = 128 bytes
  // Colors are 0B GR format, most colors have non-zero values
  const offset = stateSz - 0x20000; // VRAM is often at the end
  if (offset > 0) {
    L(`Checking offset 0x${offset.toString(16)} for VRAM...`);
    // Show hex dump at this location
    let hex = '';
    for (let i = offset; i < offset + 64 && i < stateSz; i++) {
      hex += buf[i].toString(16).padStart(2,'0') + ' ';
    }
    L(`Data @0x${offset.toString(16)}:\n${hex}`);
  }
}
</script>
</body></html>
